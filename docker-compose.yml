x-app-common: &app-common
  image: ugc-polls-app:latest
  env_file:
    - .env
  networks:
    - ugc_polls
  restart: unless-stopped

services:
  backend:
    <<: *app-common
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000
      "
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./app:/app

  db:
    image: postgres:17
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ugc_polls
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - ugc_polls
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  ugc_polls:
    name: ugc_polls
